<!DOCTYPE html>
<html>
<head>
  <title>Test Notifications API</title>
</head>
<body>
  <h1>Test Notifications API</h1>
  <button onclick="testNotifications()">Fetch Notifications</button>
  <pre id="result"></pre>
  
  <script>
    async function testNotifications() {
      const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNGI4NjQxZWJmYjhhZjU2OTE4NDJiMiIsImlhdCI6MTc4MzMzNDk0NiwiZXhwIjoxNzg1OTI2OTQ2fQ.s8TacCPaYbEwQF5SW2WS6ZptZGMZkZLyitFp7y-kW9U';
      
      try {
        const response = await fetch('http://localhost:5000/notifications', {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          }
        });
        
        const data = await response.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById('result').textContent = 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
